name: autofix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AUTH="$(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git init .
          git remote add origin "https://github.com/${REPO}.git"
          git -c http.extraheader="AUTHORIZATION: basic ${AUTH}" fetch --depth=1 origin "$SHA"
          git checkout --detach FETCH_HEAD

      - name: Install stable Rust (with rustfmt)
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env" 2>/dev/null || true
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Install Taplo (TOML formatter)
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo install taplo-cli --version 0.8.1 --locked

      - name: Debug git tracked files
        run: |
          echo "=== All tracked files ==="
          git ls-files
          echo ""
          echo "=== Is Cargo.toml tracked? ==="
          if git ls-files --error-unmatch Cargo.toml 2>/dev/null; then
            echo "OK: Cargo.toml is tracked"
          else
            echo "FAIL: Cargo.toml is not tracked"
          fi

      - name: Debug Cargo.toml bytes (before)
        run: |
          set -euo pipefail
          echo "=== Cargo.toml raw bytes ==="
          xxd Cargo.toml | head -30
          echo ""
          echo "=== Cargo.toml stats ==="
          wc -c Cargo.toml
          python3 - <<'PY'
          data = open("Cargo.toml", "rb").read()
          nl = data.count(b"\n")
          cr = data.count(b"\r")
          ends_with_lf = data.endswith(b"\n")
          print(f"Size: {len(data)} bytes")
          print(f"\\n count: {nl}")
          print(f"\\r count: {cr}")
          print(f"Ends with newline: {ends_with_lf}")
          PY

      - name: Force fix Cargo.toml line endings
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          p = Path("Cargo.toml")
          if not p.exists():
              print("FAIL: Cargo.toml does not exist")
              exit(1)

          data = p.read_bytes()
          nl = data.count(b"\n")
          cr = data.count(b"\r")
          print(f"Before: size={len(data)}, \\n={nl}, \\r={cr}")

          # Fix: if no line breaks, add LF at end
          if data.count(b'\n') == 0 and data.count(b'\r') == 0:
              if not data.endswith(b'\n'):
                  data = data + b'\n'
                  print("OK: Added LF terminator")
              else:
                  print("WARN: File already ends with LF but has no internal breaks")
          # Fix: CR-only to LF
          elif data.count(b'\r') > 0 and data.count(b'\n') == 0:
              data = data.replace(b'\r', b'\n')
              if not data.endswith(b'\n'):
                  data = data + b'\n'
              print("OK: Converted CR-only to LF")
          # Fix: CRLF to LF
          elif b'\r\n' in data:
              data = data.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
              if not data.endswith(b'\n'):
                  data = data + b'\n'
              print("OK: Converted CRLF to LF")
          else:
              print("WARN: No line ending issues detected")

          p.write_bytes(data)

          # Verify
          data = p.read_bytes()
          nl = data.count(b"\n")
          cr = data.count(b"\r")
          ends_with_lf = data.endswith(b"\n")
          print(f"After:  size={len(data)}, \\n={nl}, \\r={cr}")
          print(f"Ends with newline: {ends_with_lf}")
          PY

      - name: Fix other tracked files
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          TEXT_EXT = {".rs", ".toml", ".yml", ".yaml", ".md", ".txt", ".json", ".lock"}

          out = subprocess.check_output(["git", "ls-files", "-z"])
          files = [p for p in out.split(b"\0") if p]

          changed = []
          for b in files:
              name = b.decode("utf-8", "surrogateescape")
              if name == "Cargo.toml":
                  continue  # Already fixed
              p = Path(name)
              if p.suffix.lower() in TEXT_EXT:
                  try:
                      data = p.read_bytes()
                      if len(data) == 0:
                          continue
                      nl = data.count(b'\n')
                      cr = data.count(b'\r')
                      modified = None
                      if nl == 0 and cr == 0 and not data.endswith(b'\n'):
                          modified = data + b'\n'
                      elif cr > 0 and nl == 0:
                          modified = data.replace(b'\r', b'\n')
                          if not modified.endswith(b'\n'):
                              modified = modified + b'\n'
                      elif b'\r\n' in data:
                          modified = data.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
                          if not modified.endswith(b'\n'):
                              modified = modified + b'\n'
                      if modified and modified != data:
                          p.write_bytes(modified)
                          changed.append(name)
                  except Exception as e:
                      print(f"WARN: Skipping {name}: {e}")

          print(f"\nOK: Fixed {len(changed)} other file(s)")
          for x in changed[:50]:
              print(" -", x)
          PY

      - name: Verify .gitattributes exists and enforces LF
        run: |
          set -euo pipefail
          if [ ! -f .gitattributes ]; then
            echo "::error::.gitattributes not found!"
            exit 1
          fi
          grep -q 'text=auto eol=lf' .gitattributes || exit 1
          echo "OK: .gitattributes verified"

      - name: Normalize line endings (LF)
        run: |
          git add --renormalize . || true
          echo "After renormalize:"
          git status --porcelain || true

      - name: Rustfmt (apply)
        run: cargo fmt

      - name: Taplo fmt (apply)
        run: taplo fmt

      - name: Stage changes
        run: git add -A

      - name: Debug Cargo.toml bytes (after)
        run: |
          echo "=== Cargo.toml raw bytes (after) ==="
          xxd Cargo.toml | head -30
          echo ""
          python3 - <<'PY'
          data = open("Cargo.toml", "rb").read()
          nl = data.count(b"\n")
          cr = data.count(b"\r")
          ends_with_lf = data.endswith(b"\n")
          print(f"Size: {len(data)} bytes")
          print(f"\\n count: {nl}")
          print(f"\\r count: {cr}")
          print(f"Ends with newline: {ends_with_lf}")
          PY

      - name: Debug staged changes
        run: |
          echo "=== Staged files ==="
          git diff --cached --name-only || true
          echo ""
          echo "=== Full diff ==="
          git diff --cached || true

      - name: Final debug summary
        run: |
          set -euo pipefail
          echo "=== Final Git status ==="
          git status --porcelain
          echo ""
          echo "=== Final Git diff stat ==="
          git diff --cached --stat
          echo ""
          CHANGED=$(git status -s | wc -l)
          echo "Total git changes: $CHANGED"
          if [ "$CHANGED" -eq 0 ]; then
            echo "::warning::No changes detected"
          fi

      - name: Fail on drift
        run: |
          if ! git diff --cached --quiet; then
            echo "Formatting drift detected. Commit the following diff to a dispatcher-owned branch before merge:"
            git diff --cached
            exit 1
          fi
          echo "No formatting drift detected."
