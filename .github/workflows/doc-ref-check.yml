name: doc-ref-check

on:
  push:
  pull_request:

jobs:
  check-skill-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all markdown skill path references
        run: |
          set +e
          FAILED=0
          REF_LIST="$(mktemp)"

          echo "Existing skills:"
          find .agents/skills -maxdepth 1 -mindepth 1 -type d | sort

          echo ""
          echo "Scanning markdown files for skill path references..."

          while IFS= read -r match; do
            doc_file="${match%%:*}"
            line="${match#*:}"
            rest="$line"

            while :; do
              case "$rest" in
                *".agents/skills/"*)
                  after_prefix="${rest#*.agents/skills/}"
                  case "$after_prefix" in
                    *"/SKILL.md"*)
                      skill_name="${after_prefix%%/SKILL.md*}"
                      ref_path=".agents/skills/$skill_name/SKILL.md"

                      case "$skill_name" in
                        "")
                          break
                          ;;
                        *"*"*)
                          # Ignore wildcard examples like .agents/skills/*/SKILL.md.
                          ;;
                        *)
                          entry="$doc_file:$ref_path"
                          if ! grep -qxF "$entry" "$REF_LIST"; then
                            echo "$entry" >> "$REF_LIST"
                          fi
                          ;;
                      esac

                      rest="${after_prefix#*/SKILL.md}"
                      ;;
                    *)
                      break
                      ;;
                  esac
                  ;;
                *)
                  break
                  ;;
              esac
            done
          done < <(grep -rHF --include='*.md' '.agents/skills/' .)

          while IFS= read -r entry; do
            doc_file="${entry%%:*}"
            ref_path="${entry#*:}"

            if [ ! -f "$ref_path" ]; then
              echo "STALE REF: $doc_file -> $ref_path (does not exist)"
              FAILED=1
            else
              echo "ok: $doc_file -> $ref_path"
            fi
          done < "$REF_LIST"

          rm -f "$REF_LIST"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Fix: update the references above to match an existing skill path,"
            echo "or create the missing skill directory with a SKILL.md entrypoint."
            exit 1
          fi

          echo "All skill path references are valid."

      - name: Check REPO-RAW-URL-MAP.md covers all workflow and skill files
        run: |
          set +e
          FAILED=0
          MAP="TASKS/completed/REPO-RAW-URL-MAP.md"

          if [ ! -f "$MAP" ]; then
            echo "MISSING: $MAP does not exist"
            exit 1
          fi

          echo "Checking .github/workflows/*.yml entries in map..."
          for f in .github/workflows/*.yml; do
            if ! grep -qF "$f" "$MAP"; then
              echo "MAP MISSING: $f is not listed in $MAP"
              FAILED=1
            else
              echo "ok: $f"
            fi
          done

          echo ""
          echo "Checking .agents/skills/*/SKILL.md entries in map..."
          while IFS= read -r skill_dir; do
            skill_path="$skill_dir/SKILL.md"
            if [ ! -f "$skill_path" ]; then
              continue
            fi
            if ! grep -qF "${skill_path#./}" "$MAP"; then
              echo "MAP MISSING: $skill_path is not listed in $MAP"
              FAILED=1
            else
              echo "ok: $skill_path"
            fi
          done < <(find .agents/skills -maxdepth 1 -mindepth 1 -type d)

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Fix: add the missing paths to $MAP and update the total tracked files count."
            echo "The map must be updated in the same PR that introduces the new file."
            exit 1
          fi

          echo "Map coverage check passed."
