name: docs-build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs-build-and-deploy.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-build-and-deploy.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AUTH="$(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git init .
          git remote add origin "https://github.com/${REPO}.git"
          git -c http.extraheader="AUTHORIZATION: basic ${AUTH}" fetch --depth=1 origin "$SHA"
          git checkout --detach FETCH_HEAD

      - name: Install mdBook 0.5.0
        run: cargo install mdbook --version 0.5.0 --locked

      - name: Build docs
        run: |
          bash scripts/generate-docs.sh
          mdbook build docs

      - name: Report publish contract
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          {
            echo "Docs build succeeded."
            echo "CI validates the docs build only."
            echo "Prepare site publication locally with \`bash scripts/publish_docs_site.sh\`."
            echo "Review the generated publish worktree, then commit and push the branch update explicitly."
          }
