name: update-roadmaps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "TASKS/ADR-*.md"
      - "TASKS/ACTIVE-ROADMAP.md"
      - "scripts/update_active_roadmaps.py"

permissions:
  contents: read

env:
  ROADMAP_TIMEZONE: UTC

jobs:
  sync-roadmaps:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AUTH="$(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git init .
          git remote add origin "https://github.com/${REPO}.git"
          git -c http.extraheader="AUTHORIZATION: basic ${AUTH}" fetch --depth=1 origin "$SHA"
          git checkout --detach FETCH_HEAD

      - name: Update active roadmap blocks
        run: python3 scripts/update_active_roadmaps.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No roadmap changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Roadmap changes detected."
          fi

      - name: Fail on drift
        run: |
          if ! git diff --quiet; then
            echo "Roadmap drift detected. Commit the following diff to a dispatcher-owned branch before merging:"
            git diff
            exit 1
          fi
          echo "No roadmap drift detected."
