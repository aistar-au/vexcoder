name: update-roadmaps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "TASKS/ADR-*.md"
      - "TASKS/ACTIVE-ROADMAP.md"
      - "TASKS/TASKS-DISPATCH-MAP.md"
      - ".agents/onboarding.md"
      - "scripts/update_active_roadmaps.py"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-roadmaps:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update active roadmap blocks
        run: python3 scripts/update_active_roadmaps.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No roadmap changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Roadmap changes detected."
          fi

      - name: Create pull request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/update-roadmaps
          delete-branch: true
          commit-message: "docs(roadmap): sync active roadmap blocks"
          title: "docs(roadmap): sync active roadmap blocks"
          body: |
            Automated synchronization of active roadmap blocks.

            Generated by:
            - `scripts/update_active_roadmaps.py`
            - `.github/workflows/update-roadmaps.yml`

      - name: No-op summary
        if: steps.diff.outputs.has_changes != 'true'
        run: echo "No changes to open as pull request."
