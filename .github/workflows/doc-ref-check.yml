name: doc-ref-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-skill-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all markdown skill path references
        run: |
          set -euo pipefail
          FAILED=0
          REF_LIST="$(mktemp)"

          echo "Existing skills:"
          find .agents/skills -maxdepth 1 -mindepth 1 -type d | sort

          echo ""
          echo "Scanning markdown files for skill path references..."

          while IFS= read -r match; do
            doc_file="${match%%:*}"
            line="${match#*:}"
            rest="$line"

            while :; do
              case "$rest" in
                *".agents/skills/"*)
                  after_prefix="${rest#*.agents/skills/}"
                  case "$after_prefix" in
                    *"/SKILL.md"*)
                      skill_name="${after_prefix%%/SKILL.md*}"
                      ref_path=".agents/skills/$skill_name/SKILL.md"

                      case "$skill_name" in
                        "")
                          break
                          ;;
                        *"*"*)
                          # Ignore wildcard examples like .agents/skills/*/SKILL.md.
                          ;;
                        *"/"* | *" "*)
                          # Skill name contains a path separator or whitespace;
                          # the extracted segment spans multiple path components,
                          # meaning the match crossed a non-SKILL.md prefix on
                          # the same line. Skip it.
                          ;;
                        *)
                          entry="$doc_file:$ref_path"
                          if ! grep -qxF "$entry" "$REF_LIST"; then
                            echo "$entry" >> "$REF_LIST"
                          fi
                          ;;
                      esac

                      rest="${after_prefix#*/SKILL.md}"
                      ;;
                    *)
                      break
                      ;;
                  esac
                  ;;
                *)
                  break
                  ;;
              esac
            done
          done < <(grep -rHF --include='*.md' '.agents/skills/' . || true)

          while IFS= read -r entry; do
            doc_file="${entry%%:*}"
            ref_path="${entry#*:}"

            if [ ! -f "$ref_path" ]; then
              echo "STALE REF: $doc_file -> $ref_path (does not exist)"
              FAILED=1
            else
              echo "ok: $doc_file -> $ref_path"
            fi
          done < "$REF_LIST"

          rm -f "$REF_LIST"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Fix: update the references above to match an existing skill path,"
            echo "or create the missing skill directory with a SKILL.md entrypoint."
            exit 1
          fi

          echo "All skill path references are valid."

      - name: Check REPO-RAW-URL-MAP.md index coverage
        run: |
          set -euo pipefail
          bash .agents/skills/vex-remote-contract/scripts/update_repo_raw_url_map.sh --check-index
