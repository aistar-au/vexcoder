name: update-roadmaps

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "TASKS/ADR-*.md"
      - "TASKS/ACTIVE-ROADMAP.md"
      - "TASKS/TASKS-DISPATCH-MAP.md"
      - ".agents/onboarding.md"
      - "scripts/update_active_roadmaps.py"

permissions:
  contents: read

jobs:
  sync-roadmaps:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update active roadmap blocks
        run: python3 scripts/update_active_roadmaps.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No roadmap changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Roadmap changes detected."
          fi

      - name: Fail on drift
        run: |
          if ! git diff --quiet; then
            echo "Roadmap drift detected. Commit the following diff to main before merging:"
            git diff
            exit 1
          fi
          echo "No roadmap drift detected."
