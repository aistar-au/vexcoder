name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AUTH="$(printf 'x-access-token:%s' "$TOKEN" | base64 | tr -d '\n')"
          git init .
          git remote add origin "https://github.com/${REPO}.git"
          git -c http.extraheader="AUTHORIZATION: basic ${AUTH}" fetch --depth=1 origin "$SHA"
          git checkout --detach FETCH_HEAD

      - name: Install stable Rust (with rustfmt + clippy)
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env" 2>/dev/null || true
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Install Taplo (TOML formatter/linter)
        run: |
          set -euo pipefail
          source "$HOME/.cargo/env" 2>/dev/null || true
          cargo install taplo-cli --version 0.8.1 --locked

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run consolidated gate
        run: make gate-fast

  windows-native:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust (with rustfmt + clippy)
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Add Cargo bin to PATH
        shell: pwsh
        run: |
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run native Windows gate and packaging smoke test
        shell: pwsh
        run: |
          $versionMatch = Select-String -Path Cargo.toml -Pattern '^version = "(.+)"'
          $version = $versionMatch.Matches[0].Groups[1].Value
          .\scripts\release.ps1 -Version "v$version" -Target x86_64-pc-windows-msvc -RunGate
